name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (core, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
        # Plotting tests skip automatically when open3d/pyvista are absent.

  test-viz:
    name: tests (with viz backends, py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system libs for Open3D/PyVista
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0 libgomp1
      - name: Install (viz + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[viz,dev]"
      - name: Run tests
        run: pytest -q
